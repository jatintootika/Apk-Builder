name: Build APK with Buildozer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer "Cython<3.0.0" virtualenv

      - name: Accept Android SDK License
        run: yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        id: buildozer
        run: |
          # 1. Purani kharab files ko delete karna
          rm -rf .buildozer
          rm -rf bin
          
          # 2. Nayi fresh build shuru karna
          yes | buildozer android debug
          
          # 3. APK ka rasta dhundna
          echo "APK_PATH=$(find bin -name '*.apk' | head -n 1)" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-Itachi-V2
          path: ${{ env.APK_PATH }}
